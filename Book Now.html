/* Booking Form */
.container{
    width:80%;
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,.2);
}
 
.container h2{
    text-align:center;
    margin-bottom:20px;
    color:#2c3e50;
}
 
label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}
 
input,
select{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}
 
button{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    background:#1abc9c;
    color:white;
    font-size:18px;
    border-radius:5px;
    cursor:pointer;
}
 
button:hover{
    background:#16a085;
}
 
#confirmation{
    margin-top:20px;
    display:none;
    background:#d4edda;
    color:#155724;
    padding:20px;
    border-radius:5px;
    text-align:center;
}
 
/* Footer */
footer{
    margin-top:40px;
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:20px;
}
 
footer a{
    color:#1abc9c;
    text-decoration:none;
}
 
@media(max-width:768px){
    .container{
        width:95%;
    }
    .hero h2{
        font-size:30px;
    }
}
 
.con {
  display: grid;
  grid-template-columns: auto auto auto;
 
  padding: 10px;
}
.con div {
  background-color: #f1f1f1;
  border: 1px solid black;
  padding: 5px;
  font-size: 30px;
  text-align: center;
}
.column {
  flex: 50%;
  padding: 0 4px;
}
